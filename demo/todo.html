<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List — Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Poppins',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
    .back-btn{position:fixed;top:18px;left:18px;z-index:999;background:#10b981;color:#fff;border:none;padding:9px 18px;border-radius:50px;font-size:0.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;text-decoration:none;box-shadow:0 4px 14px rgba(16,185,129,0.4)}
    .back-btn:hover{background:#059669}
    .app{max-width:640px;margin:0 auto;padding:80px 20px 40px;flex:1}
    .app-header{text-align:center;margin-bottom:36px}
    .app-header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#10b981,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .app-header p{color:#64748b;font-size:0.9rem;margin-top:6px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
    .stat{background:#1e293b;border-radius:12px;padding:14px;text-align:center;border:1px solid #334155}
    .stat-num{font-size:1.6rem;font-weight:700;color:#10b981}
    .stat-label{font-size:0.75rem;color:#64748b;margin-top:2px}
    .input-area{display:flex;gap:10px;margin-bottom:20px}
    .task-input{flex:1;background:#1e293b;border:2px solid #334155;border-radius:12px;padding:13px 16px;color:#e2e8f0;font-family:'Poppins',sans-serif;font-size:0.95rem;transition:border 0.2s}
    .task-input:focus{outline:none;border-color:#10b981}
    .task-input::placeholder{color:#475569}
    .priority-select{background:#1e293b;border:2px solid #334155;border-radius:12px;padding:0 14px;color:#e2e8f0;font-family:'Poppins',sans-serif;font-size:0.88rem;cursor:pointer}
    .add-btn{background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;border:none;padding:13px 20px;border-radius:12px;font-size:1rem;cursor:pointer;transition:opacity 0.2s}
    .add-btn:hover{opacity:0.85}
    .filter-tabs{display:flex;gap:8px;margin-bottom:20px}
    .tab{padding:7px 18px;border-radius:50px;border:2px solid #334155;background:transparent;color:#64748b;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s}
    .tab.active{background:#10b981;border-color:#10b981;color:#fff}
    .task-list{display:flex;flex-direction:column;gap:10px}
    .task-item{background:#1e293b;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;border:1px solid #334155;transition:all 0.2s;animation:slideIn 0.3s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .task-item.done{opacity:0.5}
    .task-item.done .task-text{text-decoration:line-through;color:#475569}
    .check-btn{width:26px;height:26px;border-radius:50%;border:2px solid #334155;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;color:transparent;font-size:0.8rem}
    .check-btn:hover,.task-item.done .check-btn{background:#10b981;border-color:#10b981;color:#fff}
    .task-text{flex:1;font-size:0.93rem}
    .priority-badge{padding:3px 10px;border-radius:50px;font-size:0.72rem;font-weight:700;flex-shrink:0}
    .priority-badge.tinggi{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
    .priority-badge.sedang{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
    .priority-badge.rendah{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3)}
    .edit-btn,.del-btn{background:transparent;border:none;cursor:pointer;font-size:0.9rem;padding:4px 6px;border-radius:6px;transition:background 0.2s}
    .edit-btn{color:#64748b}.edit-btn:hover{background:#334155;color:#e2e8f0}
    .del-btn{color:#64748b}.del-btn:hover{background:#450a0a;color:#f87171}
    .empty-state{text-align:center;padding:40px;color:#475569}
    .empty-state i{font-size:3rem;margin-bottom:12px;display:block}
    footer{background:#0a0f1a;color:#475569;text-align:center;padding:20px;font-size:0.82rem;border-top:1px solid #1e293b}
  </style>
</head>
<body>
  <a href="../index.html#projects" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali</a>

  <div class="app">
    <div class="app-header">
      <h1><i class="fa-solid fa-list-check"></i> To-Do List</h1>
      <p>Kelola tugasmu dengan mudah — data tersimpan otomatis di browser</p>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Total Tugas</div></div>
      <div class="stat"><div class="stat-num" id="doneCount" style="color:#06b6d4">0</div><div class="stat-label">Selesai</div></div>
      <div class="stat"><div class="stat-num" id="pendingCount" style="color:#f59e0b">0</div><div class="stat-label">Belum Selesai</div></div>
    </div>

    <div class="input-area">
      <input type="text" class="task-input" id="taskInput" placeholder="Tambah tugas baru..." />
      <select class="priority-select" id="prioritySelect">
        <option value="sedang">Sedang</option>
        <option value="tinggi">Tinggi</option>
        <option value="rendah">Rendah</option>
      </select>
      <button class="add-btn" onclick="addTask()"><i class="fa-solid fa-plus"></i></button>
    </div>

    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('semua',this)">Semua</button>
      <button class="tab" onclick="setFilter('aktif',this)">Aktif</button>
      <button class="tab" onclick="setFilter('selesai',this)">Selesai</button>
    </div>

    <div class="task-list" id="taskList"></div>
  </div>

  <footer>© 2025 Hariz — Demo Aplikasi To-Do List</footer>

  <script>
    let tasks = JSON.parse(localStorage.getItem('hariz_tasks') || '[]');
    let filter = 'semua';

    if (tasks.length === 0) {
      tasks = [
        {id:1, text:'Belajar HTML & CSS dasar', done:true, priority:'selesai... sudah!'},
        {id:2, text:'Membuat website portofolio', done:false, priority:'tinggi'},
        {id:3, text:'Push project ke GitHub', done:false, priority:'sedang'},
        {id:4, text:'Belajar JavaScript ES6', done:false, priority:'tinggi'},
      ];
      save();
    }

    function save() { localStorage.setItem('hariz_tasks', JSON.stringify(tasks)); }

    function render() {
      const list = document.getElementById('taskList');
      let filtered = tasks.filter(t =>
        filter === 'semua' ? true : filter === 'selesai' ? t.done : !t.done
      );
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Tidak ada tugas di sini</p></div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
            <button class="check-btn" onclick="toggleDone(${t.id})">
              ${t.done ? '<i class="fa-solid fa-check"></i>' : ''}
            </button>
            <span class="task-text">${t.text}</span>
            <span class="priority-badge ${t.priority}">${t.priority}</span>
            <button class="edit-btn" onclick="editTask(${t.id})" title="Edit"><i class="fa-solid fa-pen"></i></button>
            <button class="del-btn" onclick="deleteTask(${t.id})" title="Hapus"><i class="fa-solid fa-trash"></i></button>
          </div>
        `).join('');
      }
      document.getElementById('totalCount').textContent = tasks.length;
      document.getElementById('doneCount').textContent = tasks.filter(t=>t.done).length;
      document.getElementById('pendingCount').textContent = tasks.filter(t=>!t.done).length;
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const priority = document.getElementById('prioritySelect').value;
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      tasks.unshift({ id: Date.now(), text, done: false, priority });
      input.value = '';
      save(); render();
    }

    function toggleDone(id) {
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = !t.done; save(); render(); }
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save(); render();
    }

    function editTask(id) {
      const t = tasks.find(t => t.id === id);
      if (!t) return;
      const newText = prompt('Edit tugas:', t.text);
      if (newText && newText.trim()) { t.text = newText.trim(); save(); render(); }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
